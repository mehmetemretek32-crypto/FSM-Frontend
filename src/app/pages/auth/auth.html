<div class="min-h-screen bg-[#0A0A0B] flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Arka Plan Parlamaları (Görsel Zenginlik İçin) -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl"></div>

  <!-- Glassmorphism Merkezi Kart -->
  <div class="relative w-full max-w-md p-8 rounded-[2rem] bg-white/[0.02] border border-white/[0.05] shadow-2xl backdrop-blur-xl">
    
    <!-- Başlık -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-600/20 text-blue-400 rounded-xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path></svg>
      </div>
      <h2 class="text-2xl font-bold text-white tracking-tight">
        {{ isLoginMode ? 'Sisteme Giriş Yap' : 'Yeni Hesap Oluştur' }}
      </h2>
      <p class="text-sm text-slate-400 mt-2">
        {{ isLoginMode ? 'FSM Pro paneline erişmek için bilgilerinizi girin.' : 'Saha operasyonlarına katılmak için kayıt olun.' }}
      </p>
    </div>

    <!-- Switch (Toggle) Butonları -->
    <div class="flex p-1 mb-8 bg-black/40 rounded-xl border border-white/[0.05]">
      <button (click)="isLoginMode = true" 
              [class]="isLoginMode ? 'bg-white/[0.08] text-white shadow-sm' : 'text-slate-400 hover:text-white'"
              class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300">
        Giriş Yap
      </button>
      <button (click)="isLoginMode = false" 
              [class]="!isLoginMode ? 'bg-white/[0.08] text-white shadow-sm' : 'text-slate-400 hover:text-white'"
              class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300">
        Kayıt Ol
      </button>
    </div>

    <!-- L O G I N   F O R M U -->
    @if (isLoginMode) {
      <form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()" class="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-500">
        <div class="space-y-1.5">
          <label class="text-xs font-medium text-slate-400 ml-1">E-posta Adresi</label>
          <input type="email" formControlName="email" placeholder="ornek@fsm.com"
                 class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 focus:bg-blue-500/5 transition-all">
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-slate-400 ml-1">Şifre</label>
          <input type="password" formControlName="password" placeholder="••••••••"
                 class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 focus:bg-blue-500/5 transition-all">
        </div>

        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:hover:bg-blue-600 text-white font-medium py-3 rounded-xl transition-colors mt-2 shadow-lg shadow-blue-900/20">
          Giriş Yap
        </button>
      </form>
    }

    <!-- R E G I S T E R   F O R M U -->
    @if (!isLoginMode) {
      <form [formGroup]="registerForm" (ngSubmit)="onRegisterSubmit()" class="space-y-4 animate-in fade-in slide-in-from-bottom-2 duration-500">
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-slate-400 ml-1">Ad</label>
            <input type="text" formControlName="firstName" placeholder="Adınız"
                   class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 transition-all">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-slate-400 ml-1">Soyad</label>
            <input type="text" formControlName="lastName" placeholder="Soyadınız"
                   class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 transition-all">
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-slate-400 ml-1">E-posta Adresi</label>
          <input type="email" formControlName="email" placeholder="ornek@fsm.com"
                 class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 transition-all">
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-medium text-slate-400 ml-1">Şifre</label>
          <input type="password" formControlName="password" placeholder="En az 6 karakter"
                 class="w-full bg-black/20 border border-white/[0.06] text-white rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500/50 transition-all">
        </div>

        <button type="submit" [disabled]="registerForm.invalid"
                class="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-50 disabled:hover:bg-violet-600 text-white font-medium py-3 rounded-xl transition-colors mt-2 shadow-lg shadow-violet-900/20">
          Kayıt Ol
        </button>
      </form>
    }

  </div>
</div>
